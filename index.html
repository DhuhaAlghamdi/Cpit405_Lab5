<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 5</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <h1>Lab 5</h1>
    <h2>Lab 05: DOM API and JS Events</h2>

    <div class="dashboard-card">
      <div class="dashboard-header">
        <h2>NBA Player Stats Dashboard</h2>
        <button id="darkModeBtn">Toggle Dark Mode</button>
      </div>

      <div class="controls">
        <input type="text" id="searchInput" placeholder="Search players..." />
        <select id="teamFilter">
          <option value="All">All</option>
        </select>
      </div>

      <table id="playersTable">
        <thead>
          <tr>
            <th data-key="name">Name</th>
            <th data-key="team">Team</th>
            <th data-key="points">Points</th>
            <th data-key="rebounds">Rebounds</th>
            <th data-key="assists">Assists</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
